<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fin — Controle Financeiro</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="./grafico-ascendente.png">


<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

</head>
<body>

<header>
  <div class="logo"><span>fin</span>ctrl</div>
  <nav>
    <button class="nav-btn active" onclick="showSection('dashboard')">Painel</button>
    <button class="nav-btn" onclick="showSection('movimentacoes')">Movimentações</button>
    <button class="nav-btn" onclick="showSection('graficos')">Gráficos</button>
  </nav>
  <div class="header-actions">
    <button class="btn btn-ghost btn-receita" onclick="openModal('receita')">+ Receita</button>
    <button class="btn btn-primary" onclick="openModal('despesa')">+ Despesa</button>
  </div>
</header>

<main>
  <!-- DASHBOARD -->
  <section id="sec-dashboard" class="section active">
    <h1 class="page-title">Visão <span>Geral</span></h1>
    <div class="stat-grid">
      <div class="stat-card saldo">
        <div class="stat-label">Saldo Total</div>
        <div class="stat-value" id="stat-saldo">R$ 0,00</div>
      </div>
      <div class="stat-card receita">
        <div class="stat-label">Total Receitas</div>
        <div class="stat-value income" id="stat-receitas">R$ 0,00</div>
      </div>
      <div class="stat-card despesa">
        <div class="stat-label">Total Despesas</div>
        <div class="stat-value expense" id="stat-despesas">R$ 0,00</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Últimas Movimentações</span>
        <button class="btn btn-ghost btn-sm" onclick="showSection('movimentacoes')">ver todas →</button>
      </div>
      <div id="table-dashboard"></div>
    </div>
  </section>

  <!-- MOVIMENTAÇÕES -->
  <section id="sec-movimentacoes" class="section">
    <div class="card-header" style="margin-bottom:28px">
      <h1 class="page-title" style="margin-bottom:0">Movimentações</h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-receita" onclick="openModal('receita')">+ Receita</button>
        <button class="btn btn-primary" onclick="openModal('despesa')">+ Despesa</button>
      </div>
    </div>
    <div class="filters">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="filter-search" placeholder="Pesquisar..." oninput="renderMovs()" style="width:180px">
      </div>
      <select id="filter-tipo" onchange="renderMovs()">
        <option value="">Tipo: Todos</option>
        <option value="receita">Receitas</option>
        <option value="despesa">Despesas</option>
      </select>
      <select id="filter-cat" onchange="renderMovs()">
        <option value="">Categoria: Todas</option>
      </select>
      <select id="filter-mes" onchange="renderMovs()">
        <option value="">Mês: Todos</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="clearFilters()" id="btn-clear" style="display:none">✕ limpar</button>
      <span class="filter-count" id="filter-count"></span>
    </div>
    <div class="card">
      <div id="table-movs"></div>
    </div>
  </section>

  <!-- GRÁFICOS -->
  <section id="sec-graficos" class="section">
    <h1 class="page-title">Gráficos <span>Financeiros</span></h1>
    <div class="charts-grid">
      <div class="card">
        <div class="chart-title">Despesas por Categoria</div>
        <div class="chart-wrap"><canvas id="chart-pizza"></canvas></div>
      </div>
      <div class="card">
        <div class="chart-title">Receitas × Despesas Mensais</div>
        <div class="chart-wrap"><canvas id="chart-barras"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="chart-title">Evolução do Saldo</div>
      <div class="chart-wrap" style="height:200px"><canvas id="chart-linha"></canvas></div>
    </div>
  </section>
</main>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nova Despesa</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="tipo-toggle" id="tipo-toggle">
      <button class="tipo-btn active-desp" id="btn-tipo-despesa" onclick="setTipo('despesa')">Despesa</button>
      <button class="tipo-btn" id="btn-tipo-receita" onclick="setTipo('receita')">Receita</button>
    </div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="f-nome" placeholder="Ex: Mercado, Salário...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" id="f-valor" placeholder="0,00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="f-data">
      </div>
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <select id="f-cat" class="full"></select>
    </div>
    <div class="form-group">
      <label>Descrição (opcional)</label>
      <input type="text" id="f-desc" placeholder="Detalhes adicionais...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMovimento()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><div class="dot"></div><span id="toast-msg">Salvo!</span></div>
<script src="script.js"></script>

</body>
</html>
